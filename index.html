<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE TYPE - Kinetic Typography Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importamos algunas fuentes sans-serif anchas y variables para el efecto -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&family=Playfair+Display+SC:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS RESET & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Ocultamos el cursor del sistema para usar el personalizado */
        }

        :root {
            /* Colores de la paleta retro */
            --bg-main: #f0f0f0; /* Color de fondo de la app */
            --bg-canvas: #ffeb3b; /* Color inicial del canvas (amarillo) */
            --bg-sidebar: #4caf50; /* Color de la barra lateral (verde) */
            --color-text-canvas: #000000; /* Color inicial del texto en el canvas */
            --color-outline: #000000;
            --color-shadow: #000000;
            --color-button-pink: #e91e63;
            --color-button-purple: #9c27b0;
            --color-button-orange: #ff9800;
            --color-button-yellow: #ffeb3b;

            /* Fuentes */
            --font-ui: 'Inter', sans-serif;
            --font-logo: 'Inter', sans-serif; /* Usaremos Inter Bold para simular el estilo 'Yellow Planet' */
            
            /* Sombra retro 3D */
            --box-shadow-retro: 6px 6px 0px 0px var(--color-shadow);
            --box-shadow-retro-small: 3px 3px 0px 0px var(--color-shadow);
        }

        /* LIGHT/DARK MODE */
        body.dark-mode {
            --bg-main: #212121;
            --color-outline: #ffffff;
            --color-shadow: #ffffff;
            --color-text-canvas: #ffffff;
            --box-shadow-retro: 6px 6px 0px 0px rgba(255, 255, 255, 0.5);
            --box-shadow-retro-small: 3px 3px 0px 0px rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 60px 1fr;
            overflow: hidden;
            border: 4px solid var(--color-outline);
        }

        /* HEADER */
        header {
            grid-column: 1 / 3;
            grid-row: 1 / 2;
            background-color: var(--bg-main);
            border-bottom: 4px solid var(--color-outline);
            display: flex;
            align-items: center;
            padding-left: 20px;
        }

        .logo {
            font-family: var(--font-logo);
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--color-outline);
            letter-spacing: 2px;
        }

        /* SIDEBAR (Herramientas) */
        .sidebar {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            background-color: var(--bg-sidebar);
            border-right: 4px solid var(--color-outline);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: var(--box-shadow-retro);
        }

        /* Botón Retro Base (Estilo de a.jpg) */
        .retro-button {
            display: block;
            width: 100%;
            padding: 10px 15px;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            color: var(--color-outline);
            background-color: var(--color-button-pink); /* Color por defecto */
            border: 3px solid var(--color-outline);
            box-shadow: var(--box-shadow-retro-small);
            transition: all 0.1s ease;
        }

        .retro-button:hover {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .retro-button.purple { background-color: var(--color-button-purple); }
        .retro-button.orange { background-color: var(--color-button-orange); }
        .retro-button.yellow { background-color: var(--color-button-yellow); }

        /* Controles específicos en la sidebar */
        .control-group {
            border: 2px solid var(--color-outline);
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .control-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--color-outline);
            margin-bottom: 5px;
            display: block;
        }

        /* Slider de tamaño retro */
        .slider-control {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: #fff;
            border: 2px solid var(--color-outline);
            outline: none;
        }

        .slider-control::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--color-button-orange);
            border: 2px solid var(--color-outline);
            box-shadow: var(--box-shadow-retro-small);
        }

        /* Selector de fuente retro */
        .font-selector {
            display: flex;
            gap: 5px;
        }

        .font-option {
            width: 30px;
            height: 30px;
            background: #fff;
            border: 2px solid var(--color-outline);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            box-shadow: var(--box-shadow-retro-small);
        }

        /* Color picker retro */
        .color-picker {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .color-swatch {
            width: 100%;
            padding-top: 100%; /* Cuadrado */
            border: 1px solid var(--color-outline);
        }

        /* Controles de líneas (+/-) */
        .lines-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 2px solid var(--color-outline);
            padding: 5px 10px;
            box-shadow: var(--box-shadow-retro-small);
        }

        .lines-control button {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 900;
            color: var(--color-outline);
        }

        /* Modo Claro/Oscuro switch */
        .mode-switch {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* Botón de grabar (círculo rojo) */
        .record-button {
            width: 50px;
            height: 50px;
            background-color: #ff0000;
            border-radius: 50%;
            border: 4px solid var(--color-outline);
            box-shadow: var(--box-shadow-retro);
            margin: 10px auto;
            position: relative;
        }

        .record-button.recording::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background-color: var(--color-outline);
            border-radius: 50%;
        }

        /* MAIN CANVAS AREA */
        .main-content {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(var(--bg-main) 1px, transparent 1px), linear-gradient(90deg, var(--bg-main) 1px, transparent 1px);
            background-size: 20px 20px; /* Fondo de cuadrícula de B.jpg */
            background-color: #e0e0e0; /* Color base del grid */
            position: relative;
            padding: 20px;
        }

        /* Botón superior "Teclea" (Estilo "Subscribe" de a.jpg) */
        .top-text-button {
            margin-bottom: 20px;
            max-width: 300px;
        }

        /* Contenedor del Canvas (ventana retro de B.jpg) */
        .canvas-window {
            background-color: #fff;
            border: 4px solid var(--color-outline);
            box-shadow: var(--box-shadow-retro);
            width: 100%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Barra de control de ventana retro */
        .canvas-header {
            height: 30px;
            background-color: var(--color-outline);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 5px;
        }

        .window-control {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #fff;
            border: 2px solid var(--color-outline);
        }

        /* El lienzo real */
        .canvas-body {
            background-color: var(--bg-canvas);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: aspect-ratio 0.3s ease;
            overflow: hidden;
        }

        /* El Texto Cinético (Simulación) */
        .kinetic-text {
            font-family: 'Anton', sans-serif; /* Usaremos Anton para un estilo sans-serif grueso */
            font-size: 80px;
            text-transform: uppercase;
            color: var(--color-text-canvas);
            text-align: center;
            letter-spacing: 2px;
            display: flex;
            gap: 10px;
            pointer-events: auto; /* Permite hover */
        }

        /* Animación cinética de ejemplo en hover (vibración y estiramiento) */
        .kinetic-text span {
            display: inline-block;
            transition: all 0.2s ease;
        }

        .kinetic-text:hover span {
            animation: kinetic-wave 1s infinite;
        }

        /* Variación de animación por letra */
        .kinetic-text span:nth-child(even) { animation-delay: 0.1s; }
        .kinetic-text span:nth-child(odd) { animation-delay: 0.2s; }

        @keyframes kinetic-wave {
            0%, 100% { transform: translateY(0) scaleX(1); font-weight: 700; }
            25% { transform: translateY(-10px) scaleX(1.1); font-weight: 900; }
            75% { transform: translateY(10px) scaleX(0.9); font-weight: 400; }
        }

        /* Controles de Aspect Ratio debajo del canvas */
        .aspect-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .aspect-button {
            padding: 5px 10px;
            font-size: 12px;
            border: 2px solid var(--color-outline);
            background: #fff;
            font-weight: 700;
        }

        .aspect-button.active {
            background-color: var(--color-button-yellow);
        }

        /* CURSOR PERSONALIZADO (Amarillo de B.jpg) */
        #custom-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffeb3b" stroke="%23000000" stroke-width="2"><path d="M4 4l8 20 4-8 8-4-20-8z"/></svg>');
            background-size: contain;
            pointer-events: none; /* No interfiere con clics */
            z-index: 1000;
            transform: translate(-50%, -50%); /* Centrado */
            transition: transform 0.05s ease-out; /* Suavizado */
        }

    </style>
</head>
<body>

    <!-- El Cursor Personalizado -->
    <div id="custom-cursor"></div>

    <!-- HEADER (Nombre de la App) -->
    <header>
        <div class="logo">TYPE TYPE</div>
    </header>

    <!-- SIDEBAR (Barra de herramientas) -->
    <aside class="sidebar">
        <!-- a) Botón Teclear (Simulado como control) -->
        <button class="retro-button pink top-text-button">Teclea la palabra</button>

        <!-- b) Tamaño tipografía -->
        <div class="control-group">
            <label class="control-label">Tamaño</label>
            <input type="range" min="30" max="150" value="80" class="slider-control">
        </div>

        <!-- c) Tipografía (5 opciones simuladas) -->
        <div class="control-group">
            <label class="control-label">Tipografía</label>
            <div class="font-selector">
                <div class="font-option active" style="font-family: 'Anton';">A</div>
                <div class="font-option" style="font-family: 'Inter';">A</div>
                <div class="font-option" style="font-family: 'Playfair Display SC';">A</div>
                <div class="font-option" style="font-family: sans-serif;">A</div>
                <div class="font-option" style="font-family: serif;">A</div>
            </div>
        </div>

        <!-- d) Color (Lienzo/Texto) -->
        <div class="control-group">
            <label class="control-label">Color (Lienzo / Texto)</label>
            <div class="color-picker">
                <div class="color-swatch" style="background-color: #ffeb3b; border-color: red;"></div> <!-- Actual Lienzo -->
                <div class="color-swatch" style="background-color: #000000;"></div> <!-- Actual Texto -->
                <div class="color-swatch" style="background-color: #ff0000;"></div>
                <div class="color-swatch" style="background-color: #00ff00;"></div>
                <div class="color-swatch" style="background-color: #0000ff;"></div>
            </div>
        </div>

        <!-- e) Filas de texto (+/-) -->
        <div class="control-group">
            <label class="control-label">Filas (Max 3)</label>
            <div class="lines-control">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </div>

        <!-- f) Modo Claro/Oscuro -->
        <div class="control-group mode-switch">
            <button class="retro-button yellow small-button">☀️</button>
            <button class="retro-button purple small-button">🌙</button>
        </div>

        <!-- g) Textura (Desenfoque/Pincel - Marcadores) -->
        <div class="control-group">
            <label class="control-label">Textura / Efectos</label>
            <div style="display: flex; gap: 5px;">
                <button class="retro-button orange small-button" title="Desenfoque">💧</button>
                <button class="retro-button orange small-button" title="Pincel">🖌️</button>
            </div>
        </div>

        <!-- h) Grabar (15s Max) -->
        <div class="control-group" style="text-align: center;">
            <label class="control-label">Grabar (15s)</label>
            <div class="record-button" title="Iniciar Grabación"></div>
        </div>

        <!-- i) Exportar (Video Instagram/Pinterest) -->
        <button class="retro-button purple">Exportar Video</button>

    </aside>

    <!-- MAIN CANVAS AREA -->
    <main class="main-content">
        
        <!-- Contenedor del Canvas con Estilo de Ventana de B.jpg -->
        <div class="canvas-window">
            <div class="canvas-header">
                <div class="window-control"></div>
                <div class="window-control"></div>
                <div class="window-control"></div>
            </div>
            <!-- El cuerpo del lienzo donde ocurre la magia -->
            <div class="canvas-body" id="kinetic-canvas" style="aspect-ratio: 4/3;">
                <!-- Simulación del Kinetic Type: Cada letra es un span -->
                <div class="kinetic-text">
                    <span>E</span><span>X</span><span>P</span><span>E</span><span>R</span><span>I</span><span>M</span><span>E</span><span>N</span><span>T</span><span>O</span>
                </div>
            </div>
        </div>

        <!-- Controles de Aspect Ratio -->
        <div class="aspect-controls">
            <button class="aspect-button active" aspect="4/3">4:3</button>
            <button class="aspect-button" aspect="16/9">16:9</button>
        </div>

    </main>

    <!-- Pequeño script para mover el cursor y simular cambios básicos -->
    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvasBody = document.getElementById('kinetic-canvas');
        const kineticText = document.querySelector('.kinetic-text');
        const body = document.body;

        // Movimiento del Cursor Personalizado
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Simulación de cambio de Aspect Ratio
        document.querySelectorAll('.aspect-button').forEach(btn => {
            btn.addEventListener('click', () => {
                const aspect = btn.getAttribute('aspect');
                canvasBody.style.aspectRatio = aspect;
                document.querySelector('.aspect-button.active').classList.remove('active');
                btn.classList.add('active');
            });
        });

        // Simulación básica de Modo Claro/Oscuro
        document.querySelector('.mode-switch button.purple').addEventListener('click', () => body.classList.add('dark-mode'));
        document.querySelector('.mode-switch button.yellow').addEventListener('click', () => body.classList.remove('dark-mode'));

        // Simulación básica de Grabación
        document.querySelector('.record-button').addEventListener('click', function() {
            this.classList.toggle('recording');
        });

    </style>
</body>
</html>
