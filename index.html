<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPE TYPE - Kinetic Typography Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400..800&family=Inter:wght@100..900&family=Pixelify+Sans:wght@400..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gifshot/0.3.2/gifshot.min.js"></script>

    <style>
        /* CSS RESET & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Base Colors */
            --bg-main: #f0f0f0;
            --bg-canvas: #ffeb3b;
            --bg-sidebar: #4caf50;
            --color-text-canvas: #000000;
            --color-outline: #000000;
            --color-shadow: #000000;
            
            /* Button Colors */
            --color-button-pink: #e91e63;
            --color-button-purple: #9c27b0;
            --color-button-orange: #ff9800;
            --color-button-yellow: #ffeb3b;
            --color-button-white: #ffffff;
            --color-button-black: #000000;

            /* Typography and Spacing */
            --font-ui: 'Space Mono', monospace; 
            --font-canvas: 'Inter', sans-serif;
            --tracking-canvas: 0px; 
            --line-spacing: 10px;
            
            /* Retro 3D Shadow */
            --box-shadow-retro: 6px 6px 0px 0px var(--color-shadow);
            --box-shadow-retro-small: 3px 3px 0px 0px var(--color-shadow);
        }

        /* DARK MODE */
        body.dark-mode {
            --bg-main: #212121;
            --color-outline: #ffffff;
            --color-shadow: #ffffff;
            --box-shadow-retro: 6px 6px 0px 0px rgba(255, 255, 255, 0.7);
            --box-shadow-retro-small: 3px 3px 0px 0px rgba(255, 255, 255, 0.7);
        }
        body.dark-mode .canvas-window { border-color: #fff; }
        body.dark-mode .canvas-header { background-color: #fff; }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 60px 1fr;
            overflow: hidden;
            border: 4px solid var(--color-outline);
        }

        /* HEADER */
        header {
            grid-column: 1 / 3;
            grid-row: 1 / 2;
            background-color: var(--bg-main);
            border-bottom: 4px solid var(--color-outline);
            display: flex;
            align-items: center;
            padding-left: 20px;
            z-index: 10;
        }

        .logo {
            font-size: 26px;
            font-weight: 700; 
            text-transform: uppercase;
            color: var(--color-outline);
            letter-spacing: 2px;
        }

        /* SIDEBAR (Tools) */
        .sidebar {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            background-color: var(--bg-sidebar);
            border-right: 4px solid var(--color-outline);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            box-shadow: var(--box-shadow-retro);
            z-index: 5;
        }

        .retro-button {
            display: block;
            width: 100%;
            padding: 15px;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            color: var(--color-outline);
            background-color: var(--color-button-pink);
            border: 3px solid var(--color-outline);
            box-shadow: var(--box-shadow-retro-small);
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .retro-button:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }
        .retro-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .retro-button.purple { background-color: var(--color-button-purple); }
        .retro-button.orange { background-color: var(--color-button-orange); }
        .retro-button.yellow { background-color: var(--color-button-yellow); }
        .retro-button.white { background-color: var(--color-button-white); color: #000000; }
        .retro-button.black { background-color: var(--color-button-black); color: #ffffff; }

        .control-group {
            border: 2px solid var(--color-outline);
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
        }
        body.dark-mode .control-group { background-color: #333; color: #fff; border-color: #fff; }

        .control-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .retro-input {
            width: 100%;
            padding: 10px;
            font-family: var(--font-ui);
            font-weight: 700;
            font-size: 16px;
            border: 3px solid var(--color-outline);
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
            resize: none;
            background-color: #fff;
            color: #000;
        }
        .retro-input:focus { outline: none; border-color: var(--color-button-pink); }

        .slider-control {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: #ccc;
            border: 2px solid #000;
            outline: none;
            cursor: pointer;
        }
